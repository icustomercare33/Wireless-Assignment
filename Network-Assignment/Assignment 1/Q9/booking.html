<!DOCTYPE html>
<html>

<head>
    <title>Hotel Booking</title>
</head>

<body bgcolor="#FFF5E6">
    <h1 align="center" style="color: #8B4513;">Book Your Stay</h1>
    <p align="center"><a href="home.html">Back to Home</a></p>
    <hr>

    <form>
        <table align="center" border="1" cellpadding="10" bgcolor="white">
            <tr>
                <td><b>Name:</b></td>
                <td><input type="text" name="name" size="30"></td>
            </tr>
            <tr>
                <td><b>Mobile:</b></td>
                <td><input type="text" name="mobile"></td>
            </tr>
            <tr>
                <td><b>Check-in:</b></td>
                <td><input type="date" name="in"></td>
            </tr>
            <tr>
                <td><b>Check-out:</b></td>
                <td><input type="date" name="out"></td>
            </tr>
            <tr>
                <td><b>Rooms:</b></td>
                <td><select>
                        <option>Standard</option>
                        <option>Deluxe</option>
                    </select></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Book Room"></td>
            </tr>
        </table>
    </form>
</body>

</html>
