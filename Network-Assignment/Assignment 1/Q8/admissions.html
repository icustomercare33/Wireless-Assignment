<!DOCTYPE html>
<html>

<head>
    <title>Admission Form</title>
</head>

<body bgcolor="#E6F3FF">

    <h1 align="center" style="color: darkblue;">Admission Form 2026</h1>
    <p align="center"><a href="home.html">Back to Home</a></p>
    <hr>

    <form>
        <table align="center" border="1" cellpadding="10" bgcolor="white">
            <tr>
                <td><b>Full Name:</b></td>
                <td><input type="text" name="fullname" size="40"></td>
            </tr>
            <tr>
                <td><b>Father's Name:</b></td>
                <td><input type="text" name="fathername" size="40"></td>
            </tr>
            <tr>
                <td><b>Date of Birth:</b></td>
                <td><input type="date" name="dob"></td>
            </tr>
            <tr>
                <td><b>Gender:</b></td>
                <td>
                    <input type="radio" name="gender" value="Male"> Male
                    <input type="radio" name="gender" value="Female"> Female
                </td>
            </tr>
            <tr>
                <td><b>Department:</b></td>
                <td>
                    <select name="dept">
                        <option>Science</option>
                        <option>Arts</option>
                        <option>Commerce</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><b>Address:</b></td>
                <td><textarea rows="4" cols="30"></textarea></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit Application">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>

</body>

</html>
